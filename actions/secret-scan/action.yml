name: secret-scan
description: Scan the repo for committed secrets with gitleaks (pinned + checksum-verified).

# Building block (Tier 1). The calling job should checkout with fetch-depth: 0 so gitleaks
# can scan full history.
inputs:
  gitleaks_version:
    default: "8.30.1"
  gitleaks_sha256:
    description: SHA256 of gitleaks_<ver>_linux_x64.tar.gz (integrity pin).
    default: "551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb"

runs:
  using: composite
  steps:
    - shell: bash
      env:
        V: ${{ inputs.gitleaks_version }}
        SHA: ${{ inputs.gitleaks_sha256 }}
      run: |
        set -euo pipefail
        curl -fsSL -o gitleaks.tar.gz \
          "https://github.com/gitleaks/gitleaks/releases/download/v${V}/gitleaks_${V}_linux_x64.tar.gz"
        echo "${SHA}  gitleaks.tar.gz" | sha256sum -c -
        tar -xzf gitleaks.tar.gz gitleaks
        ./gitleaks detect --source . --redact --no-banner --exit-code 1
