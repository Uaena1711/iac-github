name: aws-oidc
description: Keyless AWS authentication via GitHub OIDC (assume role, no static keys).

inputs:
  role_arn:
    description: IAM role ARN to assume (per-stack).
    required: true
  region:
    description: AWS region.
    required: true
  audience:
    description: OIDC audience claim.
    default: "sts.amazonaws.com"
  role_session_name:
    description: STS session name.
    default: "iac-github"

# The calling job MUST grant `permissions: id-token: write`.
runs:
  using: composite
  steps:
    - uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ inputs.role_arn }}
        aws-region: ${{ inputs.region }}
        audience: ${{ inputs.audience }}
        role-session-name: ${{ inputs.role_session_name }}
