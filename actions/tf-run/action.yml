name: tf-run
description: terraform plan or apply for one workspace (self-contained; per-stack backend).

inputs:
  command:
    description: plan | apply
    required: true
  dir:
    description: Workspace directory (relative to repo root).
    required: true
  tf_version:
    description: Terraform version to install.
    default: "1.15.7"
  artifact_name:
    description: Override plan artifact name (default plan-<dir-slug>).
    default: ""
  upload:
    description: >-
      (plan only) Upload the plan as an artifact for a later apply. Default "false"
      (secure): plan files embed state-derived secrets, so the reusable workflow sets
      this "true" only on the default branch — never on PR preview runs.
    default: "false"

runs:
  using: composite
  steps:
    - uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ${{ inputs.tf_version }}
        terraform_wrapper: false   # wrapper mangles `plan -detailed-exitcode` exit codes

    - id: slug
      shell: sh
      env:
        DIR_INPUT: ${{ inputs.dir }}
        NAME_INPUT: ${{ inputs.artifact_name }}
      run: |
        name="${NAME_INPUT:-plan-${DIR_INPUT}}"
        printf 'name=%s\n' "$(printf '%s' "$name" | tr '/' '-')" >> "$GITHUB_OUTPUT"

    # apply: fetch the plan. No continue-on-error — a missing artifact must fail (not no-op).
    - if: inputs.command == 'apply'
      uses: actions/download-artifact@v4
      with:
        name: ${{ steps.slug.outputs.name }}
        path: ${{ inputs.dir }}

    - shell: sh
      env:
        COMMAND: ${{ inputs.command }}
        TF_WORKSPACE_DIR: ${{ inputs.dir }}
      run: sh "$GITHUB_ACTION_PATH/run.sh" "$COMMAND"

    # plan: persist plan.tfplan + plan.status (only when upload=true, i.e. default branch).
    - if: inputs.command == 'plan' && inputs.upload == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: ${{ steps.slug.outputs.name }}
        # plan files contain state-derived secrets — only uploaded on the apply path.
        path: |
          ${{ inputs.dir }}/plan.tfplan
          ${{ inputs.dir }}/plan.status
        if-no-files-found: warn
        retention-days: 5
        overwrite: true
