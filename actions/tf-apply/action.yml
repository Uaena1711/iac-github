name: tf-apply
description: download the plan artifact and terraform apply it for one workspace.

inputs:
  dir:
    description: Workspace directory (relative to repo root).
    required: true
  tf_version:
    description: Terraform version to install.
    default: "1.15.7"
  artifact_name:
    description: Override plan artifact name (default plan-<dir-slug>).
    default: ""

runs:
  using: composite
  steps:
    - uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ${{ inputs.tf_version }}
        terraform_wrapper: false
    - id: slug
      shell: sh
      env:
        DIR_INPUT: ${{ inputs.dir }}
        NAME_INPUT: ${{ inputs.artifact_name }}
      run: |
        name="${NAME_INPUT:-plan-${DIR_INPUT}}"
        printf 'name=%s\n' "$(printf '%s' "$name" | tr '/' '-')" >> "$GITHUB_OUTPUT"
    # No continue-on-error: a missing artifact (expired/failed) must fail the job, not
    # silently no-op. run.sh uses plan.status to skip cleanly on genuine no-change plans.
    - uses: actions/download-artifact@v4
      with:
        name: ${{ steps.slug.outputs.name }}
        path: ${{ inputs.dir }}
    - shell: sh
      env:
        TF_WORKSPACE_DIR: ${{ inputs.dir }}
      run: sh "$GITHUB_ACTION_PATH/../_lib/run.sh" apply
