name: tf-lint
description: Lint Terraform — `terraform fmt -check` + tflint (pinned + checksum-verified).

# Building block (Tier 1). Cheap, no cloud access. The calling job just needs a checkout.
inputs:
  path:
    description: Directory to lint recursively (default repo root — covers envs + modules).
    default: "."
  tf_version:
    default: "1.15.7"
  tflint_version:
    default: "0.63.1"
  tflint_sha256:
    description: SHA256 of tflint_linux_amd64.zip (integrity pin).
    default: "8441a7d97df20431f19c9b9d27ff4c63e308c964e86660bc7cc0cf7bbe0725e8"

runs:
  using: composite
  steps:
    # Reuse a terraform baked into the job's container image; else install the pin.
    - id: probe
      shell: sh
      run: |
        command -v terraform >/dev/null 2>&1 && echo "terraform=yes" >> "$GITHUB_OUTPUT" || echo "terraform=no" >> "$GITHUB_OUTPUT"
    - if: steps.probe.outputs.terraform != 'yes'
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ${{ inputs.tf_version }}
        terraform_wrapper: false
    - name: terraform fmt -check
      shell: sh
      env:
        P: ${{ inputs.path }}
      run: terraform fmt -check -recursive "$P"
    - name: tflint
      shell: sh
      env:
        V: ${{ inputs.tflint_version }}
        SHA: ${{ inputs.tflint_sha256 }}
        P: ${{ inputs.path }}
      run: |
        set -eu
        dl() { if command -v curl >/dev/null 2>&1; then curl -fsSL -o "$1" "$2"; else wget -qO "$1" "$2"; fi; }
        # Reuse a tflint from the image; else install the pin.
        if command -v tflint >/dev/null 2>&1; then
          TFLINT=tflint
        else
          dl tflint.zip "https://github.com/terraform-linters/tflint/releases/download/v${V}/tflint_linux_amd64.zip"
          echo "${SHA}  tflint.zip" | sha256sum -c -
          unzip -o -q tflint.zip tflint
          TFLINT="$PWD/tflint"
        fi
        # core ruleset (no provider plugins required); respects a repo .tflint.hcl if present
        ( cd "$P" && "$TFLINT" --recursive )
