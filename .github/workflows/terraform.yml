# =============================================================================
# iac-github :: reusable Terraform flow  (the paved road)
#
#   secret_scan ─┐
#                ├─▶ plan ──▶ apply ──▶ check
#   detect ──────┘
#
# Layered: composes the Tier-1 building-block composite actions (secret-scan, detect-changes,
# aws-oidc, tf-run). One flow handles BOTH deploy and destroy via `mode`:
#   mode=deploy  (default) : plan changed workspaces -> apply on the default branch.
#   mode=destroy           : destroy-plan the `dir` workspace -> apply (= teardown), gated.
# PR = plan-only preview. Apply (deploy or destroy) is Environment-gated.
#
# Inner action refs are full-path @v1 (a reusable workflow's `./local` resolves against the
# CALLER repo, not here). release.yml moves the floating v1.
# =============================================================================
name: terraform

on:
  workflow_call:
    inputs:
      mode:
        type: string
        default: "deploy"          # deploy | destroy
      dir:
        type: string
        default: ""                # required when mode=destroy (workspace to tear down)
      workspaces_root:
        type: string
        default: "envs"
      tf_version:
        type: string
        default: "1.15.7"
      default_region:
        type: string
        default: ""
      runs_on:
        type: string
        default: "ubuntu-latest"
      lint_path:
        type: string
        default: "."
      force_all:
        type: boolean
        default: false
      shared_paths:
        type: string
        default: ""
      plan_max_parallel:
        type: number
        default: 5
      apply_max_parallel:
        type: number
        default: 1
      var_file:
        type: string
        default: ""
      tf_init_options:
        type: string
        default: ""
      tf_plan_options:
        type: string
        default: ""
      tf_apply_options:
        type: string
        default: ""
      tf_destroy_options:
        type: string
        default: ""

permissions:
  contents: read

concurrency:
  group: tf-${{ github.ref }}-${{ inputs.mode }}
  cancel-in-progress: false        # never cancel an in-flight apply/destroy

jobs:
  # Tier-1 gate: scan for committed secrets before anything touches the cloud.
  secret_scan:
    runs-on: ${{ inputs.runs_on }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: Uaena1711/iac-github/actions/secret-scan@v1

  # Tier-1 gate: terraform fmt -check + tflint (no cloud access).
  lint:
    runs-on: ${{ inputs.runs_on }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
      - uses: Uaena1711/iac-github/actions/tf-lint@v1
        with:
          path: ${{ inputs.lint_path }}
          tf_version: ${{ inputs.tf_version }}

  detect:
    runs-on: ${{ inputs.runs_on }}
    permissions:
      contents: read
    outputs:
      matrix: ${{ steps.d.outputs.matrix }}
      has_changes: ${{ steps.d.outputs.has_changes }}
    steps:
      - name: guard destroy target
        if: inputs.mode == 'destroy' && inputs.dir == ''
        run: echo "::error::mode=destroy requires the 'dir' input (the workspace to destroy)"; exit 1
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - id: d
        uses: Uaena1711/iac-github/actions/detect-changes@v1
        with:
          workspaces_root: ${{ inputs.workspaces_root }}
          force_all: ${{ inputs.force_all }}
          shared_paths: ${{ inputs.shared_paths }}
          default_region: ${{ inputs.default_region }}
          only_dir: ${{ inputs.mode == 'destroy' && inputs.dir || '' }}

  # plan (deploy) or destroy-plan (destroy). Read-only preview; gated behind secret_scan.
  plan:
    needs: [secret_scan, lint, detect]
    if: needs.detect.outputs.has_changes == 'true'
    runs-on: ${{ inputs.runs_on }}
    permissions:
      id-token: write
      contents: read
    strategy:
      fail-fast: false
      max-parallel: ${{ inputs.plan_max_parallel }}
      matrix:
        stack: ${{ fromJSON(needs.detect.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v5
      - uses: Uaena1711/iac-github/actions/aws-oidc@v1
        with:
          role_arn: ${{ matrix.stack.role_arn }}
          region: ${{ matrix.stack.region }}
      - uses: Uaena1711/iac-github/actions/tf-run@v1
        with:
          command: ${{ inputs.mode == 'destroy' && 'destroy-plan' || 'plan' }}
          dir: ${{ matrix.stack.dir }}
          tf_version: ${{ inputs.tf_version }}
          var_file: ${{ inputs.var_file }}
          tf_init_options: ${{ inputs.tf_init_options }}
          tf_plan_options: ${{ inputs.tf_plan_options }}
          tf_destroy_options: ${{ inputs.tf_destroy_options }}
          # Persist the (deploy or destroy) plan only when an apply will consume it:
          # destroy is always applied via dispatch; deploy applies on the default branch.
          upload: ${{ inputs.mode == 'destroy' || github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}

  # Executes the saved plan (a create plan deploys; a destroy plan tears down).
  apply:
    needs: [secret_scan, lint, detect, plan]
    if: >-
      needs.detect.outputs.has_changes == 'true' &&
      ( inputs.mode == 'destroy' ||
        github.ref == format('refs/heads/{0}', github.event.repository.default_branch) )
    runs-on: ${{ inputs.runs_on }}
    permissions:
      id-token: write
      contents: read
    environment: ${{ matrix.stack.environment }}   # approval gate (apply AND destroy)
    strategy:
      fail-fast: false
      max-parallel: ${{ inputs.apply_max_parallel }}
      matrix:
        stack: ${{ fromJSON(needs.detect.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v5
      - uses: Uaena1711/iac-github/actions/aws-oidc@v1
        with:
          role_arn: ${{ matrix.stack.role_arn }}
          region: ${{ matrix.stack.region }}
      - uses: Uaena1711/iac-github/actions/tf-run@v1
        with:
          command: apply
          dir: ${{ matrix.stack.dir }}
          tf_version: ${{ inputs.tf_version }}
          tf_init_options: ${{ inputs.tf_init_options }}
          tf_apply_options: ${{ inputs.tf_apply_options }}

  # Single TERMINAL status for branch protection — reflects the whole pipeline.
  check:
    needs: [secret_scan, lint, detect, plan, apply]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: roll up results
        run: |
          echo "secret_scan=${{ needs.secret_scan.result }} lint=${{ needs.lint.result }} detect=${{ needs.detect.result }} plan=${{ needs.plan.result }} apply=${{ needs.apply.result }}"
          [ "${{ needs.secret_scan.result }}" = "success" ] || { echo "secret scan failed"; exit 1; }
          [ "${{ needs.lint.result }}" = "success" ] || { echo "lint failed"; exit 1; }
          [ "${{ needs.detect.result }}" = "success" ] || { echo "detect failed"; exit 1; }
          case "${{ needs.plan.result }}"  in success|skipped) ;; *) echo "plan failed";  exit 1 ;; esac
          case "${{ needs.apply.result }}" in success|skipped) ;; *) echo "apply failed"; exit 1 ;; esac
          echo "pipeline ok"
