# =============================================================================
# iac-github :: reusable Docker-image build/publish pipeline (a layer-2 pipeline).
#
# Layered like tf-env/cfn-env — it INHERITS the shared base _gate.yml (checkout + secret_scan),
# then adds the domain lint (hadolint) and build:
#
#   gate (_gate.yml) ─┬─▶ build (downloads source artifact, +optional push) ─▶ check
#   lint (hadolint) ──┘
#
# Build ONE image per call (caller strategy.matrix for N images). Push is optional; when pushing,
# login is delegated to the pluggable registry-login composite (ghcr | ecr | ...). Native amd64
# skips QEMU (nothing privileged). Standalone: the IaC pipelines don't use this.
#
# Same-repo inner refs are full-path (a reusable workflow's ./local resolves against the CALLER);
# @feat during the live test, flipped to @v2 at release.
# =============================================================================
name: docker-image

on:
  workflow_call:
    inputs:
      image:
        description: "Full image base ref, e.g. ghcr.io/owner/name (caller computes owner)."
        type: string
        required: true
      name:
        description: "Short image id (artifact/cache-safe), unique per matrix leg, e.g. my-app."
        type: string
        required: true
      context:
        description: "Docker build context directory."
        type: string
        required: true
      provider:
        description: "registry-login provider: ghcr | ecr | ... (only used when push=true)."
        type: string
        default: ghcr
      registry:
        description: "Registry host (ghcr.io | <acct>.dkr.ecr.<region>.amazonaws.com)."
        type: string
        default: ghcr.io
      dockerfile:
        description: "Dockerfile path. Empty -> <context>/Dockerfile."
        type: string
        default: ''
      platforms:
        description: "buildx target platforms. 'linux/amd64' (native) skips QEMU."
        type: string
        default: linux/amd64,linux/arm64
      push:
        description: "Push to the registry (false = build-only validation, no login)."
        type: boolean
        default: true
      aws_region:
        description: "AWS region forwarded to registry-login (ecr provider)."
        type: string
        default: ''
      build_args:
        description: "Newline-separated build args passed to build-push-action."
        type: string
        default: ''
      provenance:
        description: "build-push-action provenance attestation."
        type: boolean
        default: false
      cache_scope:
        description: "gha cache scope. Empty -> falls back to `name`."
        type: string
        default: ''
      lint_threshold:
        description: "hadolint failure threshold: error | warning | info | style."
        type: string
        default: error
      runs_on:
        description: "Runner label."
        type: string
        default: ubuntu-latest
      tags:
        description: "docker/metadata-action tag rules (overrides the default ruleset)."
        type: string
        default: |
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=semver,pattern={{major}}
          type=sha
          type=raw,value=latest,enable={{is_default_branch}}
    secrets:
      registry_username:
        description: "Registry username (default: the GitHub actor)."
        required: false
      registry_password:
        description: "Registry password/token (default: GITHUB_TOKEN)."
        required: false
    outputs:
      digest:
        description: "The pushed image digest (sha256:...)."
        value: ${{ jobs.build.outputs.digest }}
      tags:
        description: "The resolved image tags."
        value: ${{ jobs.build.outputs.tags }}

permissions:
  contents: read

concurrency:
  group: docker-image-${{ github.ref }}-${{ inputs.name }}
  cancel-in-progress: false

jobs:
  # Inherit the shared base: upload the source once + secret_scan (gitleaks).
  gate:
    uses: Uaena1711/iac-github/.github/workflows/_gate.yml@feat/docker-image-pipeline
    with:
      artifact_name: docker-src-${{ inputs.name }}
      runs_on: ${{ inputs.runs_on }}

  # Domain lint: hadolint on the image's Dockerfile. Runs in parallel (own checkout).
  lint:
    runs-on: ${{ inputs.runs_on }}
    permissions: { contents: read }
    steps:
      - uses: actions/checkout@v5
      - uses: Uaena1711/iac-github/actions/docker-lint@feat/docker-image-pipeline
        with:
          path: ${{ inputs.dockerfile || inputs.context }}
          failure_threshold: ${{ inputs.lint_threshold }}

  build:
    needs: [gate, lint]
    runs-on: ${{ inputs.runs_on }}
    permissions:
      contents: read
      packages: write        # GHCR push via GITHUB_TOKEN; harmless for other providers
    outputs:
      digest: ${{ steps.build.outputs.digest }}
      tags: ${{ steps.meta.outputs.tags }}
    steps:
      # Pull the source the gate uploaded (download-artifact is a Node action — no git/tar needed).
      - uses: Uaena1711/iac-github/actions/checkout-artifact@feat/docker-image-pipeline
        with:
          mode: download
          name: docker-src-${{ inputs.name }}

      # QEMU only for a non-native arch; it runs a --privileged container. Skip for amd64-only.
      - if: ${{ inputs.platforms != 'linux/amd64' }}
        uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Registry login (${{ inputs.provider }})
        if: ${{ inputs.push }}
        uses: Uaena1711/iac-github/actions/registry-login@feat/docker-image-pipeline
        with:
          provider: ${{ inputs.provider }}
          registry: ${{ inputs.registry }}
          username: ${{ secrets.registry_username || github.actor }}
          password: ${{ secrets.registry_password || github.token }}
          aws_region: ${{ inputs.aws_region }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ inputs.image }}
          tags: ${{ inputs.tags }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile || format('{0}/Dockerfile', inputs.context) }}
          push: ${{ inputs.push }}
          platforms: ${{ inputs.platforms }}
          provenance: ${{ inputs.provenance }}
          build-args: ${{ inputs.build_args }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ inputs.cache_scope || inputs.name }}
          cache-to: type=gha,mode=max,scope=${{ inputs.cache_scope || inputs.name }}

      - name: Digest -> summary
        if: ${{ inputs.push }}
        run: |
          {
            echo "### ${{ inputs.image }}"
            echo '```'
            echo "${{ inputs.image }}@${{ steps.build.outputs.digest }}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  check:
    needs: [gate, lint, build]
    if: always()
    runs-on: ubuntu-latest
    permissions: { contents: read }
    steps:
      - name: roll up results
        run: |
          echo "gate=${{ needs.gate.result }} lint=${{ needs.lint.result }} build=${{ needs.build.result }}"
          [ "${{ needs.gate.result }}" = "success" ]  || { echo "gate failed";  exit 1; }
          [ "${{ needs.lint.result }}" = "success" ]  || { echo "lint failed";  exit 1; }
          [ "${{ needs.build.result }}" = "success" ] || { echo "build failed"; exit 1; }
          echo "ok"
