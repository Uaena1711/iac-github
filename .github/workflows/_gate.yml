# =============================================================================
# iac-github :: _gate — the shared "general base" every layer-2 pipeline inherits.
#
# The truly-common front of every pipeline: upload the source once (checkout-artifact) and run
# the secret scan (gitleaks). tf-env / cfn-env / docker-image all call this as their FIRST job
# (gate: uses: ._gate.yml), then their other jobs `needs: gate` and download `artifact_name`.
# Add a new common gate HERE and all layer-2 pipelines inherit it — no per-pipeline edit.
#
# Internal (leading underscore): consumers call the domain pipelines, not this. Inner action refs
# are full-path (a reusable workflow's ./local resolves against the CALLER); @feat during the live
# test, flipped to @v2 at release.
# =============================================================================
name: _gate

on:
  workflow_call:
    inputs:
      artifact_name:
        description: Name for the uploaded source artifact (domain jobs download this).
        type: string
        required: true
      runs_on:
        type: string
        default: ubuntu-latest
      checkout_image:
        type: string
        default: ""        # host (has git); a git image for a pure-Docker self-hosted runner
      secret_scan_image:
        type: string
        default: "ghcr.io/gitleaks/gitleaks:v8.30.1@sha256:c00b6bd0aeb3071cbcb79009cb16a60dd9e0a7c60e2be9ab65d25e6bc8abbb7f"

permissions:
  contents: read

jobs:
  # Single checkout: upload the source as an artifact so domain jobs pull it without git/tar
  # (download-artifact is a Node action) — lets them run in minimal images.
  checkout:
    runs-on: ${{ inputs.runs_on }}
    container: ${{ inputs.checkout_image }}   # empty = host (has git)
    permissions: { contents: read }
    steps:
      - uses: Uaena1711/iac-github/actions/checkout-artifact@feat/docker-image-pipeline
        with:
          mode: upload
          name: ${{ inputs.artifact_name }}

  secret_scan:
    runs-on: ${{ inputs.runs_on }}
    container: ${{ inputs.secret_scan_image }}
    permissions: { contents: read }
    steps:
      - uses: actions/checkout@v5
        with: { fetch-depth: 0 }        # gitleaks scans history -> needs its own full checkout
      - uses: Uaena1711/iac-github/actions/secret-scan@feat/docker-image-pipeline
