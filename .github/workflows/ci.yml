# Self-CI: lint workflows/actions, enforce version+changelog discipline, scan for secrets.
name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: install actionlint
        run: |
          curl -fsSL -o actionlint.tar.gz \
            https://github.com/rhysd/actionlint/releases/download/v1.7.12/actionlint_1.7.12_linux_amd64.tar.gz
          tar -xzf actionlint.tar.gz actionlint
      - name: actionlint
        run: ./actionlint -color

  validate-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: validate version + changelog
        env:
          BASE_REF: ${{ github.event.pull_request.base.sha }}
        run: sh scripts/validate-version.sh

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: install gitleaks
        run: |
          curl -fsSL -o gitleaks.tar.gz \
            https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
      - name: gitleaks detect
        run: ./gitleaks detect --source . --redact --no-banner --exit-code 1
